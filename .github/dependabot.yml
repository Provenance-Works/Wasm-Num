# =============================================================================
# Dependabot Configuration — wasm-num
# =============================================================================
# Automatically creates PRs to keep GitHub Actions and dependencies up-to-date.
# =============================================================================

version: 2

updates:
  # --- GitHub Actions ---
  # Keep workflow action versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    reviewers: []
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # Group all GitHub Actions updates into a single PR
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
