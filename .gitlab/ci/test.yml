# =============================================================================
# Stage: test — Test Execution & Post-build Verification
# =============================================================================
# Runs the test suite and performs post-build verification including sorry
# detection in build output and build integrity checks.
# =============================================================================

# --- Post-build sorry verification (authoritative check) ---
verify_no_sorry:
  stage: test
  tags:
    - normal
  timeout: 10m
  interruptible: true
  needs:
    - job: build_proofs
      artifacts: true
    - job: build_tests
      artifacts: true
  script:
    - |
      echo "=== Authoritative Sorry Verification ==="
      echo "Checking all build logs for sorry references..."
      found=0

      for logfile in build-proofs.log build-tests.log; do
        if [ -f "$logfile" ]; then
          sorry_hits=$(grep -i 'sorry' "$logfile" || true)
          if [ -n "$sorry_hits" ]; then
            echo "FATAL: sorry detected in $logfile:"
            echo "$sorry_hits"
            found=1
          else
            echo "$logfile: clean"
          fi
        fi
      done

      if [ "$found" -eq 1 ]; then
        echo ""
        echo "PIPELINE BLOCKED: sorry found in build output"
        exit 1
      fi

      echo ""
      echo "All build outputs verified — no sorry detected"
  rules:
    - when: on_success

# --- Build output integrity check ---
verify_build_integrity:
  stage: test
  tags:
    - normal
  timeout: 10m
  interruptible: true
  needs:
    - job: build_definitions
      artifacts: true
    - job: build_proofs
      artifacts: true
    - job: build_tests
      artifacts: true
  script:
    - |
      echo "=== Build Integrity Check ==="
      failed=0

      for logfile in build-definitions.log build-proofs.log build-tests.log; do
        if [ -f "$logfile" ]; then
          errors=$(grep -c 'error:' "$logfile" || true)
          if [ "$errors" -gt 0 ]; then
            echo "FAIL: $logfile contains $errors error(s)"
            grep 'error:' "$logfile" | head -10
            failed=1
          else
            warnings=$(grep -c 'warning:' "$logfile" || true)
            echo "PASS: $logfile ($warnings warning(s))"
          fi
        else
          echo "WARN: $logfile not found"
        fi
      done

      if [ "$failed" -eq 1 ]; then
        exit 1
      fi

      echo ""
      echo "All build outputs passed integrity check"
  rules:
    - when: on_success

# --- Full pipeline build test (default branch only) ---
full_rebuild_check:
  stage: test
  tags:
    - normal
  timeout: 180m
  interruptible: false
  needs:
    - job: build_proofs
      artifacts: false
    - job: build_tests
      artifacts: false
  cache:
    - key:
        files:
          - lean-toolchain
          - lake-manifest.json
      paths:
        - .lake/packages/
      policy: pull
    - key: "lake-build-${CI_COMMIT_SHORT_SHA}"
      paths:
        - .lake/build/
      policy: pull
  script:
    - export PATH="$ELAN_HOME/bin:$PATH"
    - |
      echo "=== Full Default Targets Build ==="
      echo "Building all default targets to verify consistency..."
      lake build 2>&1 | tee full-build.log

      errors=$(grep -c 'error:' full-build.log || true)
      if [ "$errors" -gt 0 ]; then
        echo "ERROR: Full build produced $errors error(s)"
        exit 1
      fi

      echo "Full build completed successfully"
  artifacts:
    paths:
      - full-build.log
    expire_in: 7 days
    when: always
  rules:
    # Only on default branch and MR pipelines
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
