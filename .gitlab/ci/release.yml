# =============================================================================
# Stage: release — Release Automation
# =============================================================================
# Tag-triggered release automation. Generates a verified release manifest,
# changelog, and creates a GitLab release with associated artifacts.
# =============================================================================

# --- Generate release manifest ---
generate_release_manifest:
  stage: release
  tags:
    - normal
  timeout: 15m
  interruptible: false
  needs:
    - job: build_proofs
      artifacts: true
    - job: build_tests
      artifacts: true
    - job: verify_no_sorry
      artifacts: false
  script:
    - |
      echo "=== Generating Release Manifest ==="
      cat > release-manifest.txt << EOF
      wasm-num Release Manifest
      ========================
      Version:    $CI_COMMIT_TAG
      Commit:     $CI_COMMIT_SHA
      Toolchain:  $(cat lean-toolchain)
      Build Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
      Pipeline:   $CI_PIPELINE_URL

      Targets Verified:
        - WasmNum (definitions)
        - WasmNumProofs (formal proofs)
        - TestAll (test suite)

      Verification Results:
        - Sorry check: PASSED
        - Build integrity: PASSED
        - All proofs type-checked successfully

      Project Statistics:
        Definition files: $(find WasmNum/ -name '*.lean' -not -path '*/Proofs/*' | wc -l)
        Proof files:      $(find WasmNum/Proofs/ Proofs/ -name '*.lean' 2>/dev/null | wc -l)
        Test files:       $(find WasmTest/ -name '*.lean' | wc -l)
        Total LOC:        $(find . -name '*.lean' -not -path './.lake/*' -exec cat {} + | wc -l)
      EOF

      cat release-manifest.txt
  artifacts:
    paths:
      - release-manifest.txt
    expire_in: never
    when: on_success
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# --- Generate changelog ---
generate_changelog:
  stage: release
  tags:
    - normal
  timeout: 10m
  interruptible: false
  needs: []
  script:
    - |
      echo "=== Generating Changelog ==="

      # Find previous tag
      PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

      if [ -n "$PREV_TAG" ]; then
        echo "Previous tag: $PREV_TAG"
        RANGE="${PREV_TAG}..HEAD"
      else
        echo "No previous tag — full changelog"
        RANGE="HEAD"
      fi

      cat > CHANGELOG_RELEASE.md << 'HEADER'
      ## What's Changed
      HEADER

      # Features
      feats=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^feat" 2>/dev/null || true)
      if [ -n "$feats" ]; then
        echo -e "\n### Features\n$feats" >> CHANGELOG_RELEASE.md
      fi

      # Fixes
      fixes=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^fix" 2>/dev/null || true)
      if [ -n "$fixes" ]; then
        echo -e "\n### Bug Fixes\n$fixes" >> CHANGELOG_RELEASE.md
      fi

      # Proofs
      proofs=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^proof" 2>/dev/null || true)
      if [ -n "$proofs" ]; then
        echo -e "\n### Proofs\n$proofs" >> CHANGELOG_RELEASE.md
      fi

      # All commits
      echo -e "\n### All Commits" >> CHANGELOG_RELEASE.md
      git log $RANGE --pretty=format:"- %s (%h) — %an" 2>/dev/null >> CHANGELOG_RELEASE.md || true

      # Build info
      echo -e "\n### Build Environment" >> CHANGELOG_RELEASE.md
      echo "- Lean toolchain: \`$(cat lean-toolchain)\`" >> CHANGELOG_RELEASE.md

      cat CHANGELOG_RELEASE.md
  artifacts:
    paths:
      - CHANGELOG_RELEASE.md
    expire_in: never
    when: on_success
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# --- Create GitLab Release ---
create_release:
  stage: release
  tags:
    - normal
  timeout: 10m
  interruptible: false
  needs:
    - job: generate_release_manifest
      artifacts: true
    - job: generate_changelog
      artifacts: true
    - job: build_proofs
      artifacts: true
    - job: build_tests
      artifacts: true
  script:
    - echo "Release $CI_COMMIT_TAG verified and ready"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "wasm-num $CI_COMMIT_TAG"
    description: "./CHANGELOG_RELEASE.md"
    assets:
      links:
        - name: "Release Manifest"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/release-manifest.txt"
          link_type: other
        - name: "Build Log (Proofs)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/build-proofs.log"
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: manual
      allow_failure: false
